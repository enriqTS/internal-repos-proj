<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repos Internos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script>
      // Inline theme resolution — prevents flash-of-incorrect-theme (FOIT).
      // Must run synchronously before any styles/content render.
      (function() {
        var STORAGE_KEY = 'theme-preference';
        var VALID_THEMES = ['light', 'dark'];
        var theme = null;

        try {
          var stored = localStorage.getItem(STORAGE_KEY);
          if (stored && VALID_THEMES.indexOf(stored) !== -1) {
            theme = stored;
          }
        } catch (e) {
          // localStorage unavailable (private browsing, disabled, etc.) — ignore
        }

        if (!theme) {
          try {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } catch (e) {
            theme = 'light';
          }
        }

        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>

  </head>
  <body>
    <header class="fixed top-0 left-0 right-0 z-50 bg-header-bg backdrop-blur-sm border-b border-border px-4 sm:px-6 py-3 flex items-center justify-between">
      <h1 class="font-mono text-base font-bold tracking-tight"><a href="#/" class="no-underline text-text flex items-center gap-2">Repos Internos</a></h1>
      <nav aria-label="Main navigation" class="flex items-center gap-1">
        <a href="#/projects" data-nav="projects" class="font-mono text-sm text-text-muted hover:text-accent transition-colors duration-180 px-3 py-1.5 rounded-sm no-underline">Projetos</a>
        <a href="#/templates" data-nav="templates" class="font-mono text-sm text-text-muted hover:text-accent transition-colors duration-180 px-3 py-1.5 rounded-sm no-underline">Templates</a>
        <a href="#/upload" class="font-mono text-sm text-text-muted hover:text-accent transition-colors duration-180 px-3 py-1.5 rounded-sm no-underline">Upload</a>
      </nav>
    </header>
    <main id="app" class="max-w-4xl mx-auto mt-20 px-4 sm:px-6 lg:px-8 animate-[fadeIn_300ms_ease]"></main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
