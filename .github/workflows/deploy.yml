name: Deploy Infrastructure and Frontend

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '22'
  TERRAFORM_VERSION: '1.7'

jobs:
  plan:
    name: Test & Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Lambda
        run: npm run build --workspace=lambda

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan
        working-directory: infra
        env:
          TF_VAR_domain_name: ${{ secrets.DOMAIN_NAME }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_openai_project_id: ${{ secrets.OPENAI_PROJECT_ID }}
        run: |
          terraform plan -no-color 2>&1 | tee plan_output.txt

      - name: Post plan to job summary
        working-directory: infra
        run: |
          echo '## Terraform Plan Output' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: plan
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda
        run: npm run build --workspace=lambda

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve
        env:
          TF_VAR_domain_name: ${{ secrets.DOMAIN_NAME }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_openai_project_id: ${{ secrets.OPENAI_PROJECT_ID }}

      - name: Get Terraform outputs
        id: tf_outputs
        working-directory: infra
        run: |
          echo "api_key=$(terraform output -raw api_key_value)" >> $GITHUB_OUTPUT
          echo "api_endpoint=$(terraform output -raw api_gateway_endpoint)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
          echo "templates_bucket=$(terraform output -raw templates_bucket_name)" >> $GITHUB_OUTPUT
          echo "cf_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

      - name: Build shared
        run: npm run build --workspace=shared

      - name: Build frontend
        run: npm run build --workspace=frontend
        env:
          VITE_API_KEY: ${{ steps.tf_outputs.outputs.api_key }}
          VITE_API_URL: ${{ steps.tf_outputs.outputs.api_endpoint }}

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.tf_outputs.outputs.s3_bucket }} \
            --delete \
            --exclude "projects/*" \
            --exclude "global-index.json" \
            --exclude "tags.json"

      - name: Regenerate search index
        run: |
          echo "Ensuring global-index.json exists..."
          if ! aws s3 ls "s3://${{ steps.tf_outputs.outputs.s3_bucket }}/global-index.json" 2>/dev/null; then
            echo "Creating empty search index..."
            echo '[]' | aws s3 cp - "s3://${{ steps.tf_outputs.outputs.s3_bucket }}/global-index.json" --content-type "application/json"
          else
            echo "global-index.json already exists, skipping."
          fi

      - name: Ensure tag registry exists
        run: |
          echo "Ensuring tags.json exists..."
          if ! aws s3 ls "s3://${{ steps.tf_outputs.outputs.s3_bucket }}/tags.json" 2>/dev/null; then
            echo "Creating empty tag registry..."
            echo '[]' | aws s3 cp - "s3://${{ steps.tf_outputs.outputs.s3_bucket }}/tags.json" --content-type "application/json"
          else
            echo "tags.json already exists, skipping."
          fi

      - name: Package and deploy templates
        run: |
          S3_BUCKET="${{ steps.tf_outputs.outputs.templates_bucket }}"

          # Find all template directories (chatbot-rag-* pattern)
          for TEMPLATE_DIR in templates/chatbot-rag-*/; do
            if [ ! -d "$TEMPLATE_DIR" ]; then
              continue
            fi

            TEMPLATE=$(basename "$TEMPLATE_DIR")
            S3_PREFIX="templates/$TEMPLATE"
            echo "Processing template: $TEMPLATE"

            # 1. Create artifact.zip (exclude docs/, .git*, build/, .kiro/)
            echo "  Creating artifact.zip..."
            cd "$TEMPLATE_DIR"
            zip -r "../../build-${TEMPLATE}.zip" . \
              -x "docs/*" \
              -x ".git*" \
              -x "build/*" \
              -x ".kiro/*" \
              -x "*.zip"
            cd ../..

            # 2. Upload metadata.json
            echo "  Uploading metadata.json..."
            aws s3 cp "$TEMPLATE_DIR/metadata.json" \
              "s3://$S3_BUCKET/$S3_PREFIX/metadata.json" \
              --content-type "application/json"

            # 3. Upload README as readme.md
            echo "  Uploading readme.md..."
            aws s3 cp "$TEMPLATE_DIR/README.md" \
              "s3://$S3_BUCKET/$S3_PREFIX/readme.md" \
              --content-type "text/markdown"

            # 4. Upload architecture diagrams (upload both SVG and PNG if available, prefer SVG)
            if ls "$TEMPLATE_DIR"/docs/arquitetura/*.svg 1>/dev/null 2>&1; then
              ARCH_FILE=$(ls "$TEMPLATE_DIR"/docs/arquitetura/*.svg | head -1)
              echo "  Uploading architecture.svg..."
              aws s3 cp "$ARCH_FILE" \
                "s3://$S3_BUCKET/$S3_PREFIX/architecture.svg" \
                --content-type "image/svg+xml"
            fi
            if ls "$TEMPLATE_DIR"/docs/arquitetura/*.png 1>/dev/null 2>&1; then
              ARCH_FILE=$(ls "$TEMPLATE_DIR"/docs/arquitetura/*.png | head -1)
              echo "  Uploading architecture.png..."
              aws s3 cp "$ARCH_FILE" \
                "s3://$S3_BUCKET/$S3_PREFIX/architecture.png" \
                --content-type "image/png"
            fi

            # 5. Upload artifact.zip
            echo "  Uploading artifact.zip..."
            aws s3 cp "build-${TEMPLATE}.zip" \
              "s3://$S3_BUCKET/$S3_PREFIX/artifact.zip" \
              --content-type "application/zip"

            rm -f "build-${TEMPLATE}.zip"
            echo "  Template '$TEMPLATE' deployed."
          done

      - name: Expand template files for file browser
        env:
          BUCKET_NAME: ${{ steps.tf_outputs.outputs.templates_bucket }}
        run: |
          # Expand each template's files individually to S3 for the file browser
          for TEMPLATE_DIR in templates/chatbot-rag-*/; do
            if [ ! -d "$TEMPLATE_DIR" ]; then
              continue
            fi

            TEMPLATE=$(basename "$TEMPLATE_DIR")
            echo "Expanding template files: $TEMPLATE"
            npx tsx .github/scripts/expand-template-files.ts "$TEMPLATE" "$TEMPLATE_DIR"
          done

      - name: Regenerate templates index
        run: |
          S3_BUCKET="${{ steps.tf_outputs.outputs.templates_bucket }}"
          echo "Regenerating templates-index.json..."

          # List all template prefixes in S3
          TEMPLATE_PREFIXES=$(aws s3api list-objects-v2 \
            --bucket "$S3_BUCKET" \
            --prefix "templates/" \
            --delimiter "/" \
            --query "CommonPrefixes[].Prefix" \
            --output text 2>/dev/null || echo "")

          INDEX="[]"

          for PREFIX in $TEMPLATE_PREFIXES; do
            # Skip non-template prefixes
            if [[ "$PREFIX" == "templates/arquitetura/" ]]; then
              continue
            fi

            METADATA_KEY="${PREFIX}metadata.json"

            if aws s3api head-object --bucket "$S3_BUCKET" --key "$METADATA_KEY" 2>/dev/null; then
              METADATA=$(aws s3 cp "s3://$S3_BUCKET/$METADATA_KEY" -)
              ENTRY=$(echo "$METADATA" | jq --arg path "$PREFIX" '. + {path: $path}')

              # Detect architecture image format (prefer SVG)
              if aws s3api head-object --bucket "$S3_BUCKET" --key "${PREFIX}architecture.svg" 2>/dev/null; then
                ENTRY=$(echo "$ENTRY" | jq '. + {architectureImage: "architecture.svg"}')
              elif aws s3api head-object --bucket "$S3_BUCKET" --key "${PREFIX}architecture.png" 2>/dev/null; then
                ENTRY=$(echo "$ENTRY" | jq '. + {architectureImage: "architecture.png"}')
              fi

              INDEX=$(echo "$INDEX" | jq --argjson entry "$ENTRY" '. + [$entry]')
            fi
          done

          echo "$INDEX" | jq '.' | aws s3 cp - \
            "s3://$S3_BUCKET/templates-index.json" \
            --content-type "application/json"

          echo "templates-index.json regenerated with $(echo "$INDEX" | jq length) templates."

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf_outputs.outputs.cf_distribution_id }} \
            --paths "/*"
