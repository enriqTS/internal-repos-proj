name: Deploy Infrastructure and Frontend

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'
  TERRAFORM_VERSION: '1.7'

jobs:
  plan:
    name: Test & Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Lambda
        run: |
          npm run build --workspace=lambda
          cd lambda/dist
          cp ../package.json .
          npm install --omit=dev
          zip -r lambda.zip .

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan
        working-directory: infra
        env:
          TF_VAR_domain_name: ${{ secrets.DOMAIN_NAME }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan_output.txt

      - name: Post plan to job summary
        working-directory: infra
        run: |
          echo '## Terraform Plan Output' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/tfplan
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: plan
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda
        run: |
          npm run build --workspace=lambda
          cd lambda/dist
          cp ../package.json .
          npm install --omit=dev
          zip -r lambda.zip .

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_domain_name: ${{ secrets.DOMAIN_NAME }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}

      - name: Get Terraform outputs
        id: tf_outputs
        working-directory: infra
        run: |
          echo "api_key=$(terraform output -raw api_key_value)" >> $GITHUB_OUTPUT
          echo "api_endpoint=$(terraform output -raw api_gateway_endpoint)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
          echo "cf_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

      - name: Build frontend
        run: npm run build --workspace=frontend
        env:
          VITE_API_KEY: ${{ steps.tf_outputs.outputs.api_key }}
          VITE_API_ENDPOINT: ${{ steps.tf_outputs.outputs.api_endpoint }}

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://${{ steps.tf_outputs.outputs.s3_bucket }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf_outputs.outputs.cf_distribution_id }} \
            --paths "/*"
