name: Deploy Template Entries

on:
  push:
    branches:
      - main
    paths:
      - 'templates/chatbot-rag-*/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}

jobs:
  deploy-templates:
    name: Validate and Deploy Templates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Identify changed template directories
        id: changed-templates
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- 'templates/chatbot-rag-*/')

          if [ -z "$CHANGED_FILES" ]; then
            echo "No template files changed."
            echo "templates=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract unique template directory names (e.g., chatbot-rag-mantle)
          TEMPLATES=$(echo "$CHANGED_FILES" | cut -d'/' -f2 | sort -u)
          echo "Changed templates:"
          echo "$TEMPLATES"

          TEMPLATES_JSON=$(echo "$TEMPLATES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "templates=$TEMPLATES_JSON" >> "$GITHUB_OUTPUT"

      - name: Validate template directories
        if: steps.changed-templates.outputs.templates != '' && steps.changed-templates.outputs.templates != '[]'
        run: |
          TEMPLATES='${{ steps.changed-templates.outputs.templates }}'
          FAILED=0

          for TEMPLATE in $(echo "$TEMPLATES" | jq -r '.[]'); do
            TEMPLATE_DIR="templates/$TEMPLATE"
            echo "Validating $TEMPLATE_DIR..."

            # Check required files exist
            if [ ! -f "$TEMPLATE_DIR/README.md" ]; then
              echo "::error::Template '$TEMPLATE' is missing required file: README.md"
              FAILED=1
            fi

            if [ ! -f "$TEMPLATE_DIR/metadata.json" ]; then
              echo "::error::Template '$TEMPLATE' is missing required file: metadata.json"
              FAILED=1
            fi

            # Check for architecture diagram (PNG or SVG)
            if [ ! -f "$TEMPLATE_DIR/docs/arquitetura/"*.png ] && [ ! -f "$TEMPLATE_DIR/docs/arquitetura/"*.svg ]; then
              echo "::warning::Template '$TEMPLATE' has no architecture diagram in docs/arquitetura/"
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Validation failed. Each template must contain README.md and metadata.json."
            exit 1
          fi

          echo "All template directories validated successfully."

      - name: Package and deploy templates to S3
        if: steps.changed-templates.outputs.templates != '' && steps.changed-templates.outputs.templates != '[]'
        run: |
          TEMPLATES='${{ steps.changed-templates.outputs.templates }}'

          for TEMPLATE in $(echo "$TEMPLATES" | jq -r '.[]'); do
            TEMPLATE_DIR="templates/$TEMPLATE"
            S3_PREFIX="templates/$TEMPLATE"
            echo "Processing template: $TEMPLATE"

            # 1. Create artifact.zip from the template directory (excluding docs/, .git*, build/)
            echo "  Creating artifact.zip..."
            cd "$TEMPLATE_DIR"
            zip -r "../../build-${TEMPLATE}.zip" . \
              -x "docs/*" \
              -x ".git*" \
              -x "build/*" \
              -x "*.zip"
            cd ../..

            # 2. Upload metadata.json
            echo "  Uploading metadata.json..."
            aws s3 cp "$TEMPLATE_DIR/metadata.json" \
              "s3://$S3_BUCKET/$S3_PREFIX/metadata.json" \
              --content-type "application/json"

            # 3. Upload README as readme.md
            echo "  Uploading readme.md..."
            aws s3 cp "$TEMPLATE_DIR/README.md" \
              "s3://$S3_BUCKET/$S3_PREFIX/readme.md" \
              --content-type "text/markdown"

            # 4. Upload architecture diagram (prefer PNG, fallback to SVG)
            if ls "$TEMPLATE_DIR/docs/arquitetura/"*.png 1>/dev/null 2>&1; then
              ARCH_FILE=$(ls "$TEMPLATE_DIR/docs/arquitetura/"*.png | head -1)
              echo "  Uploading architecture.png..."
              aws s3 cp "$ARCH_FILE" \
                "s3://$S3_BUCKET/$S3_PREFIX/architecture.png" \
                --content-type "image/png"
            elif ls "$TEMPLATE_DIR/docs/arquitetura/"*.svg 1>/dev/null 2>&1; then
              ARCH_FILE=$(ls "$TEMPLATE_DIR/docs/arquitetura/"*.svg | head -1)
              echo "  Uploading architecture.svg..."
              aws s3 cp "$ARCH_FILE" \
                "s3://$S3_BUCKET/$S3_PREFIX/architecture.svg" \
                --content-type "image/svg+xml"
            fi

            # 5. Upload artifact.zip
            echo "  Uploading artifact.zip..."
            aws s3 cp "build-${TEMPLATE}.zip" \
              "s3://$S3_BUCKET/$S3_PREFIX/artifact.zip" \
              --content-type "application/zip"

            # Cleanup
            rm -f "build-${TEMPLATE}.zip"

            echo "  Template '$TEMPLATE' deployed successfully."
          done

      - name: Regenerate templates index
        if: steps.changed-templates.outputs.templates != '' && steps.changed-templates.outputs.templates != '[]'
        run: |
          echo "Regenerating templates-index.json..."

          # List all template prefixes in S3
          TEMPLATE_PREFIXES=$(aws s3api list-objects-v2 \
            --bucket "$S3_BUCKET" \
            --prefix "templates/" \
            --delimiter "/" \
            --query "CommonPrefixes[].Prefix" \
            --output text)

          INDEX="[]"

          for PREFIX in $TEMPLATE_PREFIXES; do
            # Skip the arquitetura folder (not a template)
            if [[ "$PREFIX" == "templates/arquitetura/" ]]; then
              continue
            fi

            METADATA_KEY="${PREFIX}metadata.json"

            # Check if metadata.json exists
            if aws s3api head-object --bucket "$S3_BUCKET" --key "$METADATA_KEY" 2>/dev/null; then
              # Download and parse metadata
              METADATA=$(aws s3 cp "s3://$S3_BUCKET/$METADATA_KEY" -)

              # Build index entry with path field
              ENTRY=$(echo "$METADATA" | jq --arg path "$PREFIX" '. + {path: $path}')

              # Check for architecture image
              if aws s3api head-object --bucket "$S3_BUCKET" --key "${PREFIX}architecture.png" 2>/dev/null; then
                ENTRY=$(echo "$ENTRY" | jq '. + {architectureImage: "architecture.png"}')
              elif aws s3api head-object --bucket "$S3_BUCKET" --key "${PREFIX}architecture.svg" 2>/dev/null; then
                ENTRY=$(echo "$ENTRY" | jq '. + {architectureImage: "architecture.svg"}')
              fi

              INDEX=$(echo "$INDEX" | jq --argjson entry "$ENTRY" '. + [$entry]')
            fi
          done

          # Upload the regenerated index
          echo "$INDEX" | jq '.' | aws s3 cp - \
            "s3://$S3_BUCKET/templates-index.json" \
            --content-type "application/json"

          echo "templates-index.json regenerated with $(echo "$INDEX" | jq length) templates."
